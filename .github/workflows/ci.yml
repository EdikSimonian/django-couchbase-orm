name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/
      - name: Ruff format check
        run: ruff format --check src/

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]" && pip install pytest-asyncio
      - name: Run unit tests (skip integration)
        run: pytest tests/ -v --tb=short -m "not integration"
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          coverage run -m pytest tests/ -q -m "not integration"
          coverage report --show-missing --include="src/*"
          COVERAGE=$(coverage report --include="src/*" | grep TOTAL | awk '{print $NF}' | tr -d '%')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
      - name: Create coverage badge
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          echo '{"schemaVersion":1,"label":"coverage","message":"'"$COVERAGE"'%","color":"'"$(python -c "c=$COVERAGE; print('brightgreen' if c>=90 else 'green' if c>=80 else 'yellow' if c>=70 else 'orange' if c>=60 else 'red')")"'"}' > coverage.json
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/${{ vars.COVERAGE_GIST_ID }} \
            -d '{"files":{"coverage.json":{"content":"'"$(cat coverage.json)"'"}}}'

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      couchbase:
        image: couchbase/server:latest
        ports:
          - 8091-8097:8091-8097
          - 11210-11211:11210-11211
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]" && pip install pytest-asyncio
      - name: Wait for Couchbase
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8091/pools && break
            echo "Waiting for Couchbase... ($i)"
            sleep 2
          done
      - name: Initialize Couchbase
        run: |
          curl -s -X POST http://localhost:8091/clusterInit \
            -d 'hostname=127.0.0.1&username=Administrator&password=password&port=SAME&services=kv,n1ql,index&memoryQuota=256&indexMemoryQuota=256'
          sleep 5
          curl -s -X POST http://localhost:8091/pools/default/buckets \
            -u Administrator:password \
            -d 'name=testbucket&ramQuota=128&bucketType=couchbase'
          sleep 5
          curl -s -X POST http://localhost:8091/settings/indexes \
            -u Administrator:password \
            -d 'storageMode=plasma'
          sleep 3
          curl -s -X POST http://localhost:8093/query/service \
            -u Administrator:password \
            -d 'statement=CREATE PRIMARY INDEX IF NOT EXISTS ON `testbucket`._default._default'
          sleep 3
      - name: Wait for N1QL service
        run: |
          for i in $(seq 1 20); do
            result=$(curl -s -X POST http://localhost:8093/query/service \
              -u Administrator:password \
              -d 'statement=SELECT 1' 2>&1)
            if echo "$result" | grep -q '"status": "success"'; then
              echo "N1QL service is ready"
              break
            fi
            echo "Waiting for N1QL service... ($i)"
            sleep 3
          done
      - name: Run integration tests
        run: pytest tests/test_integration.py -v --tb=short

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, test, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
