name: BrewSync
options:
  bundleIdPrefix: com.brewsync
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  CouchbaseLiteSwift:
    url: https://github.com/couchbase/couchbase-lite-ios.git
    from: "3.2.0"

targets:
  BrewSync:
    type: application
    platform: iOS
    sources:
      - path: BrewSync
        excludes:
          - Info.plist
    entitlements:
      path: BrewSync/BrewSync.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brewsync.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BrewSync/BrewSync.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: BrewSync/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: BrewSync
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: CouchbaseLiteSwift
        product: CouchbaseLiteSwift
