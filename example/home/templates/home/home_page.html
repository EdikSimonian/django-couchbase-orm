{% extends "base.html" %}

{% block title %}{{ page.title }} — BrewSync{% endblock %}

{% block hero %}
<div class="hero">
    <h1>{{ page.title }}</h1>
    {% if page.body %}<p>{{ page.body|striptags|truncatewords:30 }}</p>{% endif %}
</div>
{% endblock %}

{% block content %}
<div class="cms-content">
    {{ page.body|safe }}
</div>
{% endblock %}
