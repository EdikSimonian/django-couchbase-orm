<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { color: #1a1a2e; }
        .meta { color: #666; margin-bottom: 20px; }
        .intro { font-size: 1.2em; color: #555; margin-bottom: 30px; }
        .body { line-height: 1.6; }
        footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date }}</p>
    <p class="intro">{{ page.intro }}</p>
    <div class="body">{{ page.body|safe }}</div>
    <footer>Powered by Wagtail + Couchbase</footer>
</body>
</html>
