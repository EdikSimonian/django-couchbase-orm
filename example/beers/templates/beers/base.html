<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BrewSync{% endblock %}</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e6a117;
            --accent-light: #f5c842;
            --text: #e0e0e0;
            --text-muted: #8a8a9a;
            --success: #2ecc71;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: linear-gradient(135deg, #0f3460, #16213e); padding: 24px 0; border-bottom: 2px solid var(--accent); }
        header h1 { font-size: 28px; color: var(--accent-light); display: flex; align-items: center; gap: 10px; }
        header h1 span { font-size: 20px; }
        nav { margin-top: 8px; display: flex; gap: 16px; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; }
        nav a:hover, nav a.active { color: var(--accent); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .toolbar { display: flex; gap: 12px; padding: 20px 0; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #333; border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: 15px; }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .filter-btn { padding: 8px 16px; border: 1px solid #333; border-radius: 20px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding-bottom: 40px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card h3 { font-size: 17px; color: #fff; line-height: 1.3; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-abv { background: var(--accent); color: #000; }
        .badge-ibu { background: #333; color: var(--text-muted); }
        .card-style { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
        .card-brewery { font-size: 13px; color: var(--text-muted); }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #222; }
        .stars { color: var(--accent); font-size: 14px; }
        .rating-count { font-size: 12px; color: var(--text-muted); }
        .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        footer { text-align: center; padding: 24px 0; color: var(--text-muted); font-size: 13px; border-top: 1px solid #222; }
        footer a { color: var(--accent); text-decoration: none; }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .count { font-size: 13px; color: var(--text-muted); padding: 8px 0; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1><span>🍺</span> BrewSync <span class="sync-dot"></span></h1>
            <nav>
                <a href="/beers/" class="{% if request.path == '/beers/' %}active{% endif %}">Beers</a>
                <a href="/api/beers/" target="_blank">API</a>
                <a href="/django-admin/beers/" target="_blank">Admin</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            Powered by <a href="https://github.com/EdikSimonian/django-couchbase-orm">django-couchbase-orm</a> + Couchbase
        </div>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
