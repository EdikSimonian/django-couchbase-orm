<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — BrewSync</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1e2a45; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #2a2a4a; margin: 16px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo svg { width: 64px; height: 64px; fill: #e6a117; }
        .logo h1 { font-size: 28px; color: #f5c842; margin-top: 12px; }
        .logo p { font-size: 14px; color: #8a8a9a; margin-top: 6px; line-height: 1.4; }
        label { display: block; font-size: 13px; color: #8a8a9a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px; border: 1px solid #2a2a4a; border-radius: 8px; background: #16213e; color: #e0e0e0; font-size: 15px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #e6a117; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #e6a117; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #f5c842; }
        .error { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; color: #e74c3c; font-size: 14px; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #8a8a9a; }
        .footer a { color: #e6a117; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span>🍺</span>
            <h1>BrewSync</h1>
            <p>Sign in to continue</p>
        </div>

        {% if form.errors %}
        <div class="error">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" autofocus autocapitalize="none" autocomplete="username">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" autocomplete="current-password">
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
