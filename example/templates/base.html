<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BrewSync{% endblock %}</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-alt: #16213e;
            --card: #1e2a45;
            --accent: #e6a117;
            --accent-light: #f5c842;
            --text: #e0e0e0;
            --text-muted: #8a8a9a;
            --success: #2ecc71;
            --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- NAV --- */
        nav.site-nav { background: #0d1117; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; height: 60px; }
        .nav-brand { font-size: 22px; font-weight: 700; color: var(--accent-light); text-decoration: none; display: flex; align-items: center; gap: 8px; margin-right: 40px; }
        .nav-brand span { font-size: 26px; }
        .nav-links { display: flex; gap: 4px; flex: 1; }
        .nav-links a { color: var(--text-muted); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--accent); background: rgba(230,161,23,0.1); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-right a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; }
        .nav-right a:hover { border-color: var(--accent); color: var(--accent); }

        /* --- HERO --- */
        .hero { background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%); padding: 60px 0; text-align: center; border-bottom: 2px solid var(--accent); }
        .hero h1 { font-size: 42px; color: #fff; margin-bottom: 12px; }
        .hero p { font-size: 18px; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* --- CONTENT --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        main { flex: 1; padding: 32px 0; }

        /* --- CMS CONTENT --- */
        .cms-content { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 17px; }
        .cms-content h1 { font-size: 36px; color: #fff; margin-bottom: 16px; }
        .cms-content h2 { font-size: 28px; color: var(--accent-light); margin: 32px 0 12px; }
        .cms-content h3 { font-size: 22px; color: var(--text); margin: 24px 0 8px; }
        .cms-content p { margin-bottom: 16px; color: var(--text-muted); }
        .cms-content a { color: var(--accent); }
        .cms-content img { max-width: 100%; border-radius: 8px; margin: 16px 0; }
        .cms-content ul, .cms-content ol { margin: 0 0 16px 24px; color: var(--text-muted); }
        .cms-content blockquote { border-left: 3px solid var(--accent); padding-left: 16px; margin: 16px 0; font-style: italic; color: var(--text-muted); }

        /* --- CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid transparent; text-decoration: none; color: inherit; display: block; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
        .card h3 { font-size: 17px; color: #fff; margin-bottom: 6px; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-accent { background: var(--accent); color: #000; }
        .badge-muted { background: #333; color: var(--text-muted); }

        /* --- SEARCH --- */
        .search-box { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 15px; margin-bottom: 20px; }
        .search-box:focus { outline: none; border-color: var(--accent); }

        /* --- FOOTER --- */
        footer.site-footer { background: #0d1117; border-top: 1px solid var(--border); padding: 24px 0; text-align: center; color: var(--text-muted); font-size: 13px; }
        footer a { color: var(--accent); text-decoration: none; }

        /* --- TOOLBAR --- */
        .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
        .count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

        /* --- BLOG --- */
        .blog-meta { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .blog-intro { font-size: 15px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }

        /* --- STARS --- */
        .stars { color: var(--accent); font-size: 14px; }
        .rating-count { font-size: 12px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .nav-inner { flex-wrap: wrap; height: auto; padding: 12px 20px; gap: 8px; }
            .nav-brand { margin-right: auto; }
            .nav-links { order: 3; width: 100%; }
            .hero h1 { font-size: 28px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand"><span>🍺</span> BrewSync</a>
            <div class="nav-links">
                <a href="/beers/" class="{% if '/beers' in request.path %}active{% endif %}">Beers</a>
                <a href="/blog/" class="{% if '/blog' in request.path %}active{% endif %}">Blog</a>
                <a href="/about/" class="{% if '/about' in request.path %}active{% endif %}">About</a>
                <a href="/contact/" class="{% if '/contact' in request.path %}active{% endif %}">Contact</a>
            </div>
            <div class="nav-right">
                <a href="/admin/">Manage</a>
            </div>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            Powered by <a href="https://github.com/EdikSimonian/django-couchbase-orm">django-couchbase-orm</a> + Couchbase
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
